name: AI Blog Automator

on:
  push:
    paths:
      - 'images/**' # Triggers when ANY image is added to the images folder

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CRITICAL: This gives the Bot permission to create the 'processed' folder
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai

      - name: Run AI Agent
        env:
          GITHUB_TOKEN: ${{ secrets.AI_TOKEN_SECRET }}
        run: python agent.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all new posts and the new 'processed' folder
          git add .
          
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Agent: Processed new images and updated archive" && git push)
