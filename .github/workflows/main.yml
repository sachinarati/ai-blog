name: AI Blog Automator
on:
  push:
    paths:
      - 'images/input.jpg'

permissions:
  contents: write
  models: read  # Required for GitHub Models API in 2026

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install openai

      - name: Run Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python agent.py

      - name: Commit Results
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🤖 Auto-post: New blog generated" || exit 0
          git push
