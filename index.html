<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="py-12 bg-white border-b text-center">
        <h1 class="text-4xl font-bold">📸 My Autonomous Blog</h1>
    </header>

    <main id="content" class="max-w-3xl mx-auto py-12 px-6 space-y-12">
        </main>

<script>
    async function fetchPosts() {
        const container = document.getElementById('content');
        const username = "sachinarati";
        const repo = "ai-blog";
        
        try {
            // 1. Try to get the list of files
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
            
            // If the folder doesn't exist yet, show a friendly message
            if (response.status === 404) {
                container.innerHTML = "<p class='text-center text-gray-400'>No posts found yet. Upload 'input.jpg' to the images folder to start!</p>";
                return;
            }

            const files = await response.json();

            // 2. Check if the response is actually a list (Array)
            if (!Array.isArray(files)) {
                throw new Error("GitHub API returned an unexpected response.");
            }

            container.innerHTML = ''; // Clear loading message

            for (const file of files.reverse()) {
                if (file.name.endsWith('.md')) {
                    const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/posts/${file.name}`;
                    const postRes = await fetch(rawUrl);
                    const rawMd = await postRes.text();

                    const article = document.createElement('article');
                    article.className = "prose prose-slate lg:prose-xl bg-white p-8 rounded-xl shadow-sm border mb-8";
                    article.innerHTML = marked.parse(rawMd);
                    container.appendChild(article);
                }
            }
        } catch (err) {
            console.error("Agent Error:", err);
            container.innerHTML = `<p class='text-red-500 text-center'>⚠️ Display Error: ${err.message}</p>`;
        }
    }
    fetchPosts();
</script>
    <style> img { border-radius: 8px; width: 100%; } </style>
</body>
</html>
