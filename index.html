<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="py-12 bg-white border-b text-center">
        <h1 class="text-4xl font-bold">📸 My Autonomous Blog</h1>
    </header>

    <main id="content" class="max-w-3xl mx-auto py-12 px-6 space-y-12">
        </main>

    <script>
        async function fetchPosts() {
            const container = document.getElementById('content');
            // 1. EDIT THIS: Use your actual GitHub username and repo name
            const repo = "sachinarati/ai-blog";
            
            const res = await fetch(`https://api.github.com/repos/${repo}/posts`);
            const files = await res.json();

            for (const file of files.reverse()) {
                if (file.name.endsWith('.md')) {
                    const raw = await fetch(file.download_url).then(r => r.text());
                    const section = document.createElement('article');
                    section.className = "prose prose-slate lg:prose-xl bg-white p-8 rounded-xl shadow-sm border";
                    section.innerHTML = marked.parse(raw);
                    container.appendChild(section);
                }
            }
        }
        fetchPosts();
    </script>
    <style> img { border-radius: 8px; width: 100%; } </style>
</body>
</html>
