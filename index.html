<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Blog | Shizuoka Edition</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --brand-blue: #2563eb; --bg-gray: #f8fafc; }
        body { background-color: var(--bg-gray); font-family: ui-sans-serif, system-ui, sans-serif; }
        
        /* THE SAFETY NET: Strictly hide anything beyond the 10th post */
        #blog-posts article:nth-child(n+11) {
            display: none !important;
        }

        /* Image Styling */
        article img { width: 100%; border-radius: 1rem; margin: 1.5rem 0; shadow: var(--tw-shadow); }

        /* Google Translate Styling */
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; 
            background: white; cursor: pointer; margin-top: 1rem;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-3xl mx-auto text-center py-10">
        <h1 class="text-4xl font-bold text-slate-900">📸 My AI Visual Blog</h1>
        <p class="text-slate-500 mt-2">Automated stories from Shizuoka, Japan</p>
        
        <div id="google_translate_element"></div>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto space-y-12">
        <div id="loading" class="text-center py-20 text-slate-400">
            Scanning for new memories...
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ja,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        async function fetchBlog() {
            const container = document.getElementById('blog-posts');
            const username = "sachinarati";
            const repo = "ai-blog";
            
            try {
                // 1. Get file list from GitHub API
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
                const files = await response.json();

                if (!Array.isArray(files)) throw new Error("API Limit reached or Private Repo.");

                // 2. Sort and Take Top 10
                const latestPosts = files
                    .filter(f => f.name.endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name))
                    .slice(0, 5);

                container.innerHTML = ''; 

                for (const file of latestPosts) {
                    const postRes = await fetch(file.download_url);
                    let markdown = await postRes.text();

                    // 3. IMAGE PATH FIXER
                    // Converts ../images/photo.jpg into a real web URL
                    const rawImageBase = `https://raw.githubusercontent.com/${username}/${repo}/main/images/`;
                    markdown = markdown.replace(/\.\.\/images\//g, rawImageBase);

                    const article = document.createElement('article');
                    article.className = "bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 prose prose-slate max-w-none";
                    
                    // Render to HTML
                    article.innerHTML = marked.parse(markdown);
                    container.appendChild(article);
                }
            } catch (err) {
                container.innerHTML = `<div class="text-center p-10 bg-white rounded-2xl border">
                    <p class="text-slate-500">Ready to start! Upload a photo to your images folder.</p>
                </div>`;
            }
        }

        fetchBlog();
    </script>
</body>
</html>
