<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Stories </title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --accent: #6366f1;
        }
        
        body { 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }

        /* Glassmorphism Article Card */
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        article:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        /* Custom Scrollbar for a premium feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Google Translate Stylings */
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            padding: 10px 20px; border-radius: 50px; border: none;
            background: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            font-weight: 500; color: #475569; outline: none;
        }

        /* Load More Button Styling */
        #load-more-container {
            display: flex; justify-content: center; padding-bottom: 3rem;
        }
        .btn-load {
            padding: 12px 32px; background: var(--accent); color: white;
            border-radius: 50px; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }
        .btn-load:hover { filter: brightness(1.1); transform: scale(1.05); }
    </style>
</head>
<body class="p-4">

    <header class="max-w-4xl mx-auto text-center pt-16 pb-12">
        <div class="inline-block px-4 py-1 mb-4 text-xs font-semibold tracking-widest text-indigo-600 uppercase bg-indigo-100 rounded-full">
            Auto-Generated Journal
        </div>
        <h1 class="text-5xl font-black text-slate-900 tracking-tight">AI Visual <span class="text-indigo-600">Archive</span></h1>
        <p class="text-slate-600 mt-4 text-lg">Exploring life through an AI lens.</p>
        
        <div id="google_translate_element" class="mt-6"></div>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto space-y-12">
        </main>

    <div id="load-more-container" class="mt-12">
        </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ja,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        let allPosts = [];
        let displayedCount = 0;
        const BATCH_SIZE = 10;
        const username = "sachinarati";
        const repo = "ai-blog";

        async function initBlog() {
            const container = document.getElementById('blog-posts');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
                const files = await response.json();
                
                if (!Array.isArray(files)) throw new Error();

                // 1. Sort all markdown files by filename descending
                allPosts = files
                    .filter(f => f.name.endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                renderNextBatch();
            } catch (err) {
                container.innerHTML = `<p class="text-center text-slate-500">No stories found yet.</p>`;
            }
        }

        async function renderNextBatch() {
            const container = document.getElementById('blog-posts');
            const nextBatch = allPosts.slice(displayedCount, displayedCount + BATCH_SIZE);
            
            for (const file of nextBatch) {
                const postRes = await fetch(file.download_url);
                let markdown = await postRes.text();

                // Image Path Fixer
                const rawImageBase = `https://raw.githubusercontent.com/${username}/${repo}/main/images/`;
                markdown = markdown.replace(/\.\.\/images\//g, rawImageBase);

                const article = document.createElement('article');
                article.className = "p-8 md:p-12 rounded-3xl shadow-xl prose prose-slate max-w-none";
                article.innerHTML = marked.parse(markdown);
                container.appendChild(article);
            }

            displayedCount += nextBatch.length;
            updateLoadMoreButton();
        }

        function updateLoadMoreButton() {
            const btnContainer = document.getElementById('load-more-container');
            btnContainer.innerHTML = ''; 

            if (displayedCount < allPosts.length) {
                const btn = document.createElement('button');
                btn.className = 'btn-load';
                btn.innerText = `View Older Posts (${allPosts.length - displayedCount} remaining)`;
                btn.onclick = renderNextBatch;
                btnContainer.appendChild(btn);
            }
        }

        initBlog();
    </script>
</body>
</html>
