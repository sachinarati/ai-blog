<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        article img { border-radius: 12px; margin: 2rem auto; width: 100%; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        /* Clean up Google Translate Widget */
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; 
            background: white; outline: none; font-family: sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="py-12 bg-white border-b shadow-sm text-center">
        <h1 class="text-4xl font-extrabold text-slate-800">📸 AI Visual Journals</h1>
        
        <div id="google_translate_element" class="mt-6"></div>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto py-12 px-4 space-y-16">
        <div id="loading" class="text-center py-20 text-slate-400 animate-pulse">
            Fetching latest stories...
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ja,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
    async function loadBlog() {
        const container = document.getElementById('blog-posts');
        const username = "sachinarati";
        const repo = "ai-blog";
        
        try {
            // 1. Fetch the list of files
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
            const files = await response.json();

            // If it's not an array, the API failed
            if (!Array.isArray(files)) {
                console.error("API Error:", files);
                throw new Error("Could not fetch post list");
            }

            // 2. Filter, Reverse, and Slice to 10
            const postsToShow = files
                .filter(f => f.name.endsWith('.md'))
                .reverse()
                .slice(0, 10);

            if (postsToShow.length === 0) {
                container.innerHTML = "<p class='text-center'>No .md files found in /posts folder.</p>";
                return;
            }

            container.innerHTML = ''; // Clear loading message

            for (const file of postsToShow) {
                // Get the raw text of the markdown file
                const postRes = await fetch(file.download_url);
                let markdown = await postRes.text();

                // 3. THE IMAGE FIXER (Simple Version)
                // This replaces "../images/" with the real web URL so the browser can see it
                const rawImageBase = `https://raw.githubusercontent.com/${username}/${repo}/main/images/`;
                markdown = markdown.replace(/\.\.\/images\//g, rawImageBase);

                const article = document.createElement('article');
                article.className = "bg-white p-8 rounded-2xl shadow-sm border mb-12 prose max-w-none";
                
                // Render the fixed markdown
                article.innerHTML = marked.parse(markdown);
                container.appendChild(article);
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            container.innerHTML = `<p class='text-center text-red-500'>Error loading posts. Check console (F12) for details.</p>`;
        }
    }
    loadBlog();
</script>
  
</body>
</html>
