<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        article img { border-radius: 12px; margin: 2rem auto; width: 100%; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        /* Clean up Google Translate Widget */
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; 
            background: white; outline: none; font-family: sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="py-12 bg-white border-b shadow-sm text-center">
        <h1 class="text-4xl font-extrabold text-slate-800">📸 AI Visual Journals</h1>
        
        <div id="google_translate_element" class="mt-6"></div>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto py-12 px-4 space-y-16">
        <div id="loading" class="text-center py-20 text-slate-400 animate-pulse">
            Fetching latest stories...
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ja,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // 2. IMAGE PATH FIXER
        const renderer = new marked.Renderer();
        const username = "sachinarati";
        const repo = "ai-blog";

        renderer.image = function(href, title, text) {
            let cleanHref = href;
            if (href.startsWith('../images/')) {
                const fileName = href.split('/').pop();
                // Forces the browser to load the direct raw image link
                cleanHref = `https://raw.githubusercontent.com/${username}/${repo}/main/images/${fileName}`;
            }
            return `<img src="${cleanHref}" alt="${text || ''}" class="rounded-xl shadow-lg my-6">`;
        };

        marked.setOptions({ renderer: renderer });

        async function loadBlog() {
            const container = document.getElementById('blog-posts');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
                const files = await response.json();

                if (!Array.isArray(files)) throw new Error("No posts found.");

                // 3. LIMIT TO 10 POSTS & SORT NEWEST FIRST
                const latestTen = files
                    .filter(f => f.name.endsWith('.md'))
                    .reverse()
                    .slice(0, 10);

                container.innerHTML = ''; 

                for (const file of latestTen) {
                    const rawMd = await fetch(file.download_url).then(res => res.text());
                    const postElement = document.createElement('article');
                    postElement.className = "bg-white p-8 rounded-2xl shadow-sm border border-slate-100 prose prose-slate max-w-none";
                    postElement.innerHTML = marked.parse(rawMd);
                    container.appendChild(postElement);
                }
            } catch (err) {
                container.innerHTML = `<p class="text-center text-slate-400">Ready for your first post! Upload 'input.jpg' to begin.</p>`;
            }
        }

        loadBlog();
    </script>
</body>
</html>
