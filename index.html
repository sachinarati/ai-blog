<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Stories </title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.95);
            --accent: #6366f1;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        body { 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
        }

        /* Glassmorphism Card Style */
        article {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        article:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.1);
        }

        /* Image Polish */
        article img {
            border-radius: 1.5rem;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.2);
            margin: 2.5rem 0;
            border: 6px solid white;
            width: 100%;
            display: block;
        }

        /* Professional Translate Button */
        #google_translate_element {
            display: inline-block;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        #google_translate_element:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.15);
            border-color: var(--accent);
        }
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            border: none; outline: none; background: transparent;
            cursor: pointer; font-size: 14px; font-weight: 600; color: #4f46e5;
        }

        /* Load More Button */
        .btn-load {
            padding: 16px 40px; background: var(--accent); color: white;
            border-radius: 99px; font-weight: 700; cursor: pointer;
            box-shadow: 0 12px 24px -6px rgba(99, 102, 241, 0.5);
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-load:hover { filter: brightness(1.1); transform: scale(1.03); }

        /* Typography Fixes */
        .prose h1, .prose h2 { color: #0f172a; font-weight: 800; }
        .prose p { line-height: 1.8; color: #475569; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-4xl mx-auto text-center pt-16 pb-20">
        <div class="inline-flex items-center px-5 py-1.5 mb-8 text-xs font-black tracking-widest text-indigo-600 uppercase bg-indigo-100/80 rounded-full border border-indigo-200">
            <span class="relative flex h-2 w-2 mr-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-600"></span>
            </span>
            AI Visual Journal
        </div>
        <h1 class="text-6xl md:text-7xl font-black text-slate-900 tracking-tighter leading-none">
            Visual <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-600">Archive</span>
        </h1>
        <p class="text-slate-500 mt-6 text-xl max-w-xl mx-auto font-medium">Auto-generated stories by AI.</p>
        
        <div class="mt-10">
            <div id="google_translate_element"></div>
        </div>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto space-y-20">
        </main>

    <div id="load-more-container" class="flex justify-center py-24">
        </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                // Added Marathi (mr) and Hindi (hi)
                includedLanguages: 'en,ja,mr,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        let allPosts = [];
        let displayedCount = 0;
        const BATCH_SIZE = 5; // --- YOUR 5 POST LIMIT ---
        const username = "sachinarati";
        const repo = "ai-blog";

        async function initBlog() {
            const container = document.getElementById('blog-posts');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts?t=${Date.now()}`);
                const files = await response.json();
                
                if (!Array.isArray(files)) throw new Error();

                // Sort newest first
                allPosts = files
                    .filter(f => f.name.toLowerCase().endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                renderNextBatch();
            } catch (err) {
                container.innerHTML = `<div class="text-center p-20 bg-white/50 rounded-[3rem] border-2 border-dashed border-slate-300">
                    <p class="text-slate-400 text-lg font-bold italic">The archive is currently empty. Upload a photo to begin.</p>
                </div>`;
            }
        }

        async function renderNextBatch() {
            const container = document.getElementById('blog-posts');
            const nextBatch = allPosts.slice(displayedCount, displayedCount + BATCH_SIZE);
            
            for (const file of nextBatch) {
                try {
                    const postRes = await fetch(file.download_url);
                    let markdown = await postRes.text();

                    // Automatic Image Path Fixer
                    const rawImageBase = `https://raw.githubusercontent.com/${username}/${repo}/main/images/`;
                    markdown = markdown.replace(/\.\.\/images\//g, rawImageBase);

                    const article = document.createElement('article');
                    article.className = "p-10 md:p-16 prose prose-slate max-w-none";
                    article.innerHTML = marked.parse(markdown);
                    container.appendChild(article);
                } catch (e) {
                    console.error("Post loading failed", e);
                }
            }

            displayedCount += nextBatch.length;
            updateLoadMoreButton();
        }

        function updateLoadMoreButton() {
            const btnContainer = document.getElementById('load-more-container');
            btnContainer.innerHTML = ''; 

            if (displayedCount < allPosts.length) {
                const btn = document.createElement('button');
                btn.className = 'btn-load';
                btn.innerHTML = `
                    <span>Show 5 More</span> 
                    <span class="px-2 py-0.5 text-[10px] bg-white/30 rounded-full font-bold uppercase tracking-widest">${allPosts.length - displayedCount} Left</span>
                `;
                btn.onclick = renderNextBatch;
                btnContainer.appendChild(btn);
            } else if (allPosts.length > 0) {
                btnContainer.innerHTML = `<p class="text-slate-400 font-bold tracking-widest uppercase text-xs">End of Archive ✨</p>`;
            }
        }

        initBlog();
    </script>
</body>
</html>
