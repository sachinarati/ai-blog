<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Archive | AI Blog</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.95); 
            --accent: #6366f1; 
        }
        
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            background-attachment: fixed; 
            min-height: 100vh; 
            font-family: 'Inter', system-ui, sans-serif; 
            position: relative;
        }

        /* TOP-LEFT TRANSLATE BUTTON */
        #google_translate_element { 
            position: fixed; /* Stays in corner during scroll */
            top: 20px; 
            left: 20px; 
            z-index: 9999;
            background: white; 
            padding: 6px 16px; 
            border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0; 
        }

        /* Clean up Google UI */
        .goog-te-gadget span { display: none !important; }
        .goog-te-combo { 
            border: none; outline: none; background: transparent; 
            cursor: pointer; font-size: 13px; font-weight: 600; color: #4f46e5;
        }

        /* Blog Card Styling */
        article { 
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            border-radius: 2.5rem; 
            border: 1px solid rgba(255,255,255,0.6); 
            transition: all 0.3s ease;
        }
        article:hover { transform: translateY(-5px); box-shadow: 0 25px 40px rgba(0,0,0,0.08); }

        /* Professional Image Handling */
        article img { 
            border-radius: 1.5rem; 
            margin: 2rem 0; 
            width: 100%; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.12); 
            border: 5px solid white; 
        }

        /* Load More Button */
        .btn-load { 
            padding: 16px 36px; 
            background: var(--accent); 
            color: white; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: transform 0.2s;
        }
        .btn-load:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Responsive spacing for mobile */
        @media (max-width: 640px) {
            #google_translate_element { top: 10px; left: 10px; padding: 4px 10px; }
            header { padding-top: 60px; }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="google_translate_element"></div>

    <header class="max-w-4xl mx-auto text-center pt-12 pb-16">
        <h1 class="text-6xl font-black text-slate-900 mb-4 tracking-tighter">
            Visual <span class="text-indigo-600">Archive</span>
        </h1>
        <p class="text-slate-500 text-lg">AI-powered stories </p>
    </header>

    <main id="blog-posts" class="max-w-3xl mx-auto space-y-16"></main>

    <div id="load-more-container" class="flex justify-center py-20"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,ja,mr,hi,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        let allPosts = [];
        let displayedCount = 0;
        const BATCH_SIZE = 5; // Loads 5 at a time
        const username = "sachinarati";
        const repo = "ai-blog";

        async function initBlog() {
            const container = document.getElementById('blog-posts');
            try {
                // Fetch list of posts from GitHub
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts?t=${Date.now()}`);
                const files = await res.json();
                
                if (!Array.isArray(files)) throw new Error("No files found");

                // Filter markdown and sort newest first
                allPosts = files
                    .filter(f => f.name.endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                renderNextBatch();
            } catch (e) {
                container.innerHTML = `<div class="text-center p-12 bg-white/50 rounded-3xl border-2 border-dashed border-slate-300 text-slate-400">Archive is ready. Upload an image to start.</div>`;
            }
        }

        async function renderNextBatch() {
            const container = document.getElementById('blog-posts');
            const nextBatch = allPosts.slice(displayedCount, displayedCount + BATCH_SIZE);
            
            for (const file of nextBatch) {
                const postRes = await fetch(file.download_url);
                let markdown = await postRes.text();

                // IMAGE PATH FIXER: Changes ../images/processed/ to a live GitHub URL
                const rawBase = `https://raw.githubusercontent.com/${username}/${repo}/main/images/processed/`;
                markdown = markdown.replace(/\.\.\/images\/processed\//g, rawBase);
                
                const article = document.createElement('article');
                article.className = "p-10 md:p-14 prose prose-slate max-w-none";
                article.innerHTML = marked.parse(markdown);
                container.appendChild(article);
            }

            displayedCount += nextBatch.length;
            updatePaginationUI();
        }

        function updatePaginationUI() {
            const container = document.getElementById('load-more-container');
            if (displayedCount < allPosts.length) {
                container.innerHTML = `
                    <button class="btn-load" onclick="renderNextBatch()">
                        View Older Posts (${allPosts.length - displayedCount} left)
                    </button>
                `;
            } else if (allPosts.length > 0) {
                container.innerHTML = `<p class="text-slate-400 font-bold uppercase tracking-widest text-xs">End of Archive ✨</p>`;
            }
        }

        initBlog();
    </script>
</body>
</html>
